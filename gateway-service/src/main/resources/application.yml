spring:
  main:
    web-application-type: reactive  # Gateway는 WebFlux 기반 — 리액티브 모드 강제 설정
  application:
    name: gateway-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
  config:
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-auth.yml
      - optional:file:.env[.properties]
  data:
    redis:
      host: ${REDIS_HOST} # Redis 호스트
      port: ${REDIS_PORT} # Redis 포트
  cloud:
    gateway:
      routes:
        - id: auth-service-auth
          uri: http://localhost:${AUTH_SERVER_PORT}
          predicates:
            - Path=/api/auth/**,/login/**,/oauth2/**
        - id: household-service
          uri: http://localhost:${HOUSEHOLD_SERVER_PORT}
          predicates:
            - Path=/households/**
        - id: apartment-complex-service
          uri: http://localhost:${COMPLEX_SERVER_PORT}
          predicates:
            - Path=/api/admin/master/apartment-complexes/**
        - id: parking-vehicle-service
          uri: http://localhost:${PARKING_SERVER_PORT}
          predicates:
            - Path=/parking-vehicles/**
        - id: facility-reservation-service
          uri: http://localhost:${FACILITY_SERVER_PORT}
          predicates:
            - Path=/facilities/**,/facility-reservations/**
        - id: board-service
          uri: http://localhost:${BOARD_SERVER_PORT}
          predicates:
            - Path=/boards/**,/comments/**
        - id: notification-service
          uri: http://localhost:${NOTIFICATION_SERVER_PORT}
          predicates:
            - Path=/notifications/**

gateway:
  auth:
    excluded-paths:
      - /api/auth/**
      - /login/**
      - /oauth2/**
    jwt-secret: ${JWT_SECRET_KEY}

server:
  port: ${GATEWAY_SERVER_PORT}

constants:
  api:
    prefix: /api