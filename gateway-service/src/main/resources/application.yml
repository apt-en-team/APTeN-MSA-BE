spring:
  main:
    web-application-type: reactive  # Gateway는 WebFlux 기반 — 리액티브 모드 강제 설정
  application:
    name: gateway-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
  config:
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-auth.yml
      - optional:file:../.env[.properties]
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  cloud:
    gateway:
      routes:
        - id: auth-service-auth
          uri: http://localhost:${AUTH_SERVER_PORT}
          predicates:
            - Path=/api/auth/**,/login/**,/oauth2/**

        # /api/admin/master/apartment-complexes/** 는 complex-service로 — auth-service보다 먼저 선언해야 충돌 안 남
        - id: apartment-complex-service
          uri: http://localhost:${COMPLEX_SERVER_PORT:9082}
          predicates:
            - Path=/api/admin/master/apartment-complexes/**,/api/apartment-complexes/**

        # MASTER -> MANAGER 생성, MANAGER → ADMIN 생성 API — auth-service로 라우팅
        - id: auth-service-admin
          uri: http://localhost:${AUTH_SERVER_PORT}
          predicates:
            - Path=/api/admin/master/managers/**,/api/admin/manager/admins/**

        # 내 계정 조회/수정 API — auth-service로 라우팅
        - id: auth-service-users
          uri: http://localhost:${AUTH_SERVER_PORT}
          predicates:
            - Path=/api/users/**

        - id: household-service
          uri: http://localhost:${HOUSEHOLD_SERVER_PORT}
          predicates:
            - Path=/households/**

        - id: parking-vehicle-service
          uri: http://localhost:${PARKING_SERVER_PORT}
          predicates:
            - Path=/parking-vehicles/**

        - id: facility-reservation-service
          uri: http://localhost:${FACILITY_SERVER_PORT}
          predicates:
            - Path=/facilities/**,/facility-reservations/**

        - id: board-service
          uri: http://localhost:${BOARD_SERVER_PORT}
          predicates:
            - Path=/boards/**,/comments/**

        - id: notification-service
          uri: http://localhost:${NOTIFICATION_SERVER_PORT}
          predicates:
            - Path=/notifications/**

gateway:
  auth:
    excluded-paths:
      - /api/auth/**
      - /login/**
      - /oauth2/**
      - /api/apartment-complexes/**
    jwt-secret: ${JWT_SECRET_KEY}

server:
  port: ${GATEWAY_SERVER_PORT}

constants:
  api:
    prefix: /api