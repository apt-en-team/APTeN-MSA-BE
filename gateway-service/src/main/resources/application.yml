spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service-auth
          uri: http://localhost:9080
          predicates:
            - Path=/auth/**,/login/**,/oauth2/**
        - id: household-service
          uri: http://localhost:9084
          predicates:
            - Path=/households/**
        - id: apartment-complex-service
          uri: http://localhost:9082
          predicates:
            - Path=/apartment-complexes/**
        - id: parking-vehicle-service
          uri: http://localhost:9083
          predicates:
            - Path=/parking-vehicles/**
        - id: facility-reservation-service
          uri: http://localhost:9086
          predicates:
            - Path=/facilities/**,/facility-reservations/**
        - id: board-service
          uri: http://localhost:9085
          predicates:
            - Path=/boards/**,/comments/**
        - id: notification-service
          uri: http://localhost:9081
          predicates:
            - Path=/notifications/**

gateway:
  auth:
    excluded-paths:
      - /auth/**
      - /login/**
      - /oauth2/**
    jwt-secret: apten-auth-service-secret-key-for-local-template-123456

server:
  port: 9000
