spring:
  main:
    web-application-type: reactive  # Gateway는 WebFlux 기반 — 리액티브 모드 강제 설정
  application:
    name: gateway-service
  config:
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-auth.yml
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  data:
    redis:
      host: localhost # Redis 호스트
      port: 6379 # Redis 포트
  cloud:
    gateway:
      routes:
        - id: auth-service-auth
          uri: http://localhost:9080
          predicates:
            - Path=/api/auth/**,/login/**,/oauth2/**
        - id: household-service
          uri: http://localhost:9084
          predicates:
            - Path=/households/**
        - id: apartment-complex-service
          uri: http://localhost:9082
          predicates:
            - Path=/apartment-complexes/**
        - id: parking-vehicle-service
          uri: http://localhost:9083
          predicates:
            - Path=/parking-vehicles/**
        - id: facility-reservation-service
          uri: http://localhost:9086
          predicates:
            - Path=/facilities/**,/facility-reservations/**
        - id: board-service
          uri: http://localhost:9085
          predicates:
            - Path=/boards/**,/comments/**
        - id: notification-service
          uri: http://localhost:9081
          predicates:
            - Path=/notifications/**

gateway:
  auth:
    excluded-paths:
      - /api/auth/**
      - /login/**
      - /oauth2/**
    jwt-secret: apten-auth-service-secret-key-for-local-template-123456

server:
  port: 9000

constants:
  api:
    prefix: /api